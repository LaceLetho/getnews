[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/app/docker-entrypoint.sh api-server"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# 注意：Volumes 必须通过 Railway 控制台手动创建，不能通过配置文件创建
# 请参考 RAILWAY_DEPLOYMENT.md 中的 "持久化存储" 部分

# 如果需要定时任务，可以使用 cron
# cronSchedule = "0 */6 * * *"  # 每6小时执行一次
